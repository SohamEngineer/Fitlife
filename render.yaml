services:
  - type: web
    name: fitlife-api
    runtime: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RESET_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: AI_MOCK_MODE
        value: "false"
